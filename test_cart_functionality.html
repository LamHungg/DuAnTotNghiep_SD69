<!DOCTYPE html>
<html>
  <head>
    <title>Test Cart Functionality</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 20px;
      }
      .test-section {
        margin: 20px 0;
        padding: 15px;
        border: 1px solid #ddd;
        border-radius: 5px;
      }
      button {
        padding: 10px 15px;
        margin: 5px;
        background: #007bff;
        color: white;
        border: none;
        border-radius: 3px;
        cursor: pointer;
      }
      button:hover {
        background: #0056b3;
      }
      .result {
        margin-top: 10px;
        padding: 10px;
        background: #f8f9fa;
        border-radius: 3px;
      }
      .error {
        background: #f8d7da;
        color: #721c24;
      }
      .success {
        background: #d4edda;
        color: #155724;
      }
    </style>
  </head>
  <body>
    <h1>🧪 Test Cart Functionality</h1>

    <div class="test-section">
      <h3>1. Test Backend Connection</h3>
      <button onclick="testBackend()">Test Backend</button>
      <div id="backend-result" class="result"></div>
    </div>

    <div class="test-section">
      <h3>2. Test Authentication</h3>
      <input
        type="text"
        id="token"
        placeholder="Nhập token (customer-token-7)"
        value="customer-token-7"
        style="width: 200px; padding: 5px"
      />
      <button onclick="testAuth()">Test Auth</button>
      <div id="auth-result" class="result"></div>
    </div>

    <div class="test-section">
      <h3>3. Test Get Cart</h3>
      <button onclick="testGetCart()">Get Cart</button>
      <div id="getcart-result" class="result"></div>
    </div>

    <div class="test-section">
      <h3>4. Test Add To Cart</h3>
      <input
        type="number"
        id="productId"
        placeholder="Product ID"
        value="1"
        style="width: 100px; padding: 5px"
      />
      <input
        type="number"
        id="quantity"
        placeholder="Quantity"
        value="1"
        style="width: 100px; padding: 5px"
      />
      <button onclick="testAddToCart()">Add To Cart</button>
      <div id="addcart-result" class="result"></div>
    </div>

    <div class="test-section">
      <h3>5. Test Cart Count</h3>
      <button onclick="testCartCount()">Get Cart Count</button>
      <div id="count-result" class="result"></div>
    </div>

    <script>
      const API_URL = "http://localhost:8080/api/cart";

      function log(elementId, message, isError = false) {
        const element = document.getElementById(elementId);
        element.innerHTML = `<div class="${
          isError ? "error" : "success"
        }">${message}</div>`;
      }

      async function testBackend() {
        try {
          const response = await fetch(API_URL + "/test-no-auth");
          const data = await response.text();
          log("backend-result", `✅ Backend OK: ${data}`);
        } catch (error) {
          log("backend-result", `❌ Backend Error: ${error.message}`, true);
        }
      }

      async function testAuth() {
        try {
          const token = document.getElementById("token").value;
          const response = await fetch(API_URL + "/test", {
            headers: {
              Authorization: `Bearer ${token}`,
            },
          });
          const data = await response.text();
          log("auth-result", `✅ Auth OK: ${data}`);
        } catch (error) {
          log("auth-result", `❌ Auth Error: ${error.message}`, true);
        }
      }

      async function testGetCart() {
        try {
          const token = document.getElementById("token").value;
          const response = await fetch(API_URL, {
            headers: {
              Authorization: `Bearer ${token}`,
            },
          });
          const data = await response.json();
          log(
            "getcart-result",
            `✅ Get Cart OK: ${JSON.stringify(data, null, 2)}`
          );
        } catch (error) {
          log("getcart-result", `❌ Get Cart Error: ${error.message}`, true);
        }
      }

      async function testAddToCart() {
        try {
          const token = document.getElementById("token").value;
          const productId = document.getElementById("productId").value;
          const quantity = document.getElementById("quantity").value;

          const response = await fetch(API_URL + "/add", {
            method: "POST",
            headers: {
              Authorization: `Bearer ${token}`,
              "Content-Type": "application/json",
            },
            body: JSON.stringify({
              chiTietSanPhamId: parseInt(productId),
              soLuong: parseInt(quantity),
            }),
          });
          const data = await response.text();
          log("addcart-result", `✅ Add To Cart OK: ${data}`);
        } catch (error) {
          log("addcart-result", `❌ Add To Cart Error: ${error.message}`, true);
        }
      }

      async function testCartCount() {
        try {
          const token = document.getElementById("token").value;
          const response = await fetch(API_URL + "/count", {
            headers: {
              Authorization: `Bearer ${token}`,
            },
          });
          const data = await response.text();
          log("count-result", `✅ Cart Count OK: ${data}`);
        } catch (error) {
          log("count-result", `❌ Cart Count Error: ${error.message}`, true);
        }
      }

      // Auto test backend on load
      window.onload = function () {
        testBackend();
      };
    </script>
  </body>
</html>
